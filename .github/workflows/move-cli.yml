name: Publish the new version of initia-move-cli

on:
  workflow_run:
    workflows: ["Release rust libmovevm"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

jobs:
  linux-build:
    name: Build on Linux (cross)
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross

      - name: Build binary
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Create tar.gz
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../initia-move-cli-${{ github.event.inputs.version || github.event.workflow_run.head_branch }}-${{ matrix.suffix }}.tar.gz initia-move

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: initia-move-cli-${{ github.event.inputs.version || github.event.workflow_run.head_branch }}-${{ matrix.suffix }}.tar.gz
  macos-build:
    name: Build on macOS (native)
    runs-on: macos-12
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        include:
          - target: x86_64-apple-darwin
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release --target ${{ matrix.target }} --bin initia-move

      - name: Create tar.gz
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../initia-move-cli-${{ github.event.inputs.version || github.event.workflow_run.head_branch }}-${{ matrix.suffix }}.tar.gz initia-move

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: initia-move-cli-${{ github.event.inputs.version || github.event.workflow_run.head_branch }}-${{ matrix.suffix }}.tar.gz

  homebrew-release:
    if: |
      (github.event_name == 'workflow_run' && startsWith(github.event.workflow_run.head_branch, 'v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.version, 'v'))
    name: homebrew-release
    runs-on: ubuntu-22.04
    needs: [linux-build, macos-build]
    steps:
      - name: Release project to Homebrew tap
        uses: Justintime50/homebrew-releaser@v2
        with:
          homebrew_owner: djm07073
          homebrew_tap: homebrew-tap
          formula_folder: Formula
          version: ${{ github.event.inputs.version || github.event.workflow_run.head_branch }}
          github_token: ${{ secrets.GH_RELEASE_TOKEN }}
          commit_owner: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          install: | 
              bin.install "initia-move" => "initia-move"
          test: 'assert_match version.to_s, shell_output("#{bin}/initia-move version")'
          target_darwin_amd64: true
          target_darwin_arm64: true
          target_linux_amd64: false
          target_linux_arm64: false
          update_readme_table: false
          skip_commit: false
          debug: false

